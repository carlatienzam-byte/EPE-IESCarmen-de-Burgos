<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  <script src="https://unpkg.com/aframe-event-set-component@5.x.x/dist/aframe-event-set-component.min.js"></script>
	 <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.5.4/dist/aframe-extras.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.5.2/dist/aframe-extras.min.js"></script>
</head>
<body>
<a-scene>

	<a-sound src="url(warm-nights.mp3)" autoplay="true" position="0 2 5"></a-sound>
  

  <a-gltf-model src="backrooms_vr.glb" scale="1.25 1.25 1.25" position="0 0 0"></a-gltf-model>

  <a-plane width="50" height="50" material="color: #ba9652"
           rotation="-90 0 0" geometry="height: 1000; width: 1000"
           position="0 -4.344 0"></a-plane>

  <a-sky color="#b28f50"></a-sky>


<a-link id="miEnlace1" 
		class="clickable" src="Sala Gasolinera.png" 
		href="https://carlatienzam-byte.github.io/EPE-Alberto_Santin-Vera/" 
		title="Sala Gasolinera" position="6.4927 0.948 6.76992" 
		scale="0.5 0.5 0.5" 
		geometry="primitive: circle; segments: 64" 
		material="shader: portal; side: double; previewDistance: 7.5" 
		rotation="0 90 0">
	<a-entity 									
			  text="align: center; color: white; font: kelsonsans; value: Sala Gasolinera; width: 5" 
			  position="0 1.5 0" 
			  rotation="0 180 0">
	</a-entity>
	
	<a-entity 
			  geometry="primitive: sphere; phiLength: 180; thetaLength: 360; segmentsHeight: 64; segmentsWidth: 64" 
			  material="shader: portal; side: back; borderEnabled: 0; previewDistance: 7.5" rotation="0 180 0" 
			  visible="false">
	</a-entity>
	<a-entity 
			  geometry="primitive: sphere; radius: 10; segmentsHeight: 64; segmentsWidth: 64" 
			  material="shader: portal; side: back; borderEnabled: 0; previewDistance: 7.5" 
			  visible="false">
	</a-entity>
	</a-link>
	
	<a-entity class="clickable portal"
          id="portal1"
          position="6.4927 0.948 6.76992" 
          scale="1 1 1"
          geometry="primitive: ring; radiusInner: 0.8; radiusOuter: 1.2"
          material="shader: standard; color: purple; emissive: #7c3cff; emissiveIntensity: 2"
		  rotation="0 90 0">
</a-entity>
	
  <a-link id="miEnlace2"
		  class="clickable"
		  src="Japanese Period.png" 
		  href="https://carlatienzam-byte.github.io/EPE-Carmen-Lara-Gomez/" 
		  title="Sala Japanese Period" position="-42.05693 1.3171 -4.44459" 
		  scale="0.5 0.5 0.5">
	</a-link>
	
  <a-link id="miEnlace3"
		  class="clickable"
		  src="Strange World.png" 
		  href="https://carlatienzam-byte.github.io/EPE-Alejandra-Henche-de-Lucas/" 
		  title="Strange World" 
		  position="-54.32779 1.14831 8.06231" 
		  scale="0.5 0.5 0.5">
	</a-link>
	
  <a-link id="miEnlace4" 
		  class="clickable"
		  src="The Simpsons.jpg"  
		  href="https://carlatienzam-byte.github.io/EPE-Laura-Sofia-Aguirre/" 
		  title="The Simpsons" 
		  position="-53.73499 1.76586 -4.54693" 
		  scale="0.5 0.5 0.5"></a-link>
	
  <a-link id="miEnlace5"
		  class="clickable"
		  src="AdventureTime.jpg"  
		  href="https://carlatienzam-byte.github.io/EPE-Pilar-Montalvo-Velasco/" 
		  title="Adventure Time" 
		  position="-79.05526 1.66112 18.02414" 
		  scale="0.5 0.5 0.5"></a-link>

  <!-- Inicio entidad completa para camara y movimiento -->
             <a-entity
        id="playerRig"
        position="0 0 0"
        movement-controls="speed: 0.3; fly: false;"
        universal-controls="movementEnabled: true;"
      >
         <!-- Controlador mano derecha -->
  			 
<a-entity
    id="rightHand"
    laser-controls="hand: right"
    raycaster="objects: .clickable"
    cursor="rayOrigin: entity; fuse: false"
    oculus-touch-controls="hand: right">
</a-entity>

      <!-- Controlador mano izquierda (opcional) -->
   <a-entity
    id="leftHand"
    laser-controls="hand: left"
    raycaster="objects: .clickable"
    cursor="rayOrigin: entity; fuse: false"
    oculus-touch-controls="hand: left">
</a-entity>
         
      <a-entity camera look-controls position="0 1.6 0"></a-entity>
         </a-entity>
<!-- Fin entidad completa -->
       
</a-scene>

<script>
let currentTransition = false;

// 🔥 Fade overlay
const fade = document.createElement('a-plane');
fade.setAttribute('position', '0 0 -0.5');
fade.setAttribute('width', '5');
fade.setAttribute('height', '5');
fade.setAttribute('material', 'color: black; opacity: 0');
fade.setAttribute('class', 'fade');
document.querySelector('a-scene').appendChild(fade);

function fadeOutIn(callback) {
  if (currentTransition) return;
  currentTransition = true;

  fade.setAttribute('animation', {
    property: 'material.opacity',
    to: 1,
    dur: 300
  });

  setTimeout(() => {
    callback();

    fade.setAttribute('animation', {
      property: 'material.opacity',
      to: 0,
      dur: 500
    });

    setTimeout(() => {
      currentTransition = false;
    }, 500);

  }, 300);
}

// 🔥 SOLO efecto hover (sin salir de VR)
function setupVRLink(id, url) {
  const el = document.querySelector(id);

  el.addEventListener('mouseenter', () => {
    el.setAttribute('scale', '0.7 0.7 0.7');
  });

  el.addEventListener('mouseleave', () => {
    el.setAttribute('scale', '0.5 0.5 0.5');
  });

  el.addEventListener('click', () => {

    fadeOutIn(() => {
      // ✔ OPCIÓN SEGURA VR:
      // abre en nueva pestaña SIN romper VR
      window.open(url, '_blank');
    });

  });
}

// links
setupVRLink('#miEnlace1','https://carlatienzam-byte.github.io/EPE-Alberto_Santin-Vera/');
setupVRLink('#miEnlace2','https://carlatienzam-byte.github.io/EPE-Carmen-Lara-Gomez/');
setupVRLink('#miEnlace3','https://carlatienzam-byte.github.io/EPE-Alejandra-Henche-de-Lucas/');
setupVRLink('#miEnlace4','https://carlatienzam-byte.github.io/EPE-Laura-Sofia-Aguirre/');
setupVRLink('#miEnlace5','https://carlatienzam-byte.github.io/EPE-Pilar-Montalvo-Velasco/');

// audio fix VR
document.addEventListener('DOMContentLoaded', () => {
  const resumeAudio = () => {
    document.querySelectorAll('[sound]').forEach(e => {
      const s = e.components.sound;
      if (s) s.playSound();
    });
  };

  window.addEventListener('click', resumeAudio);
  window.addEventListener('triggerdown', resumeAudio);
});
</script>
</body>
</html>
