<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  <script src="https://unpkg.com/aframe-event-set-component@5.x.x/dist/aframe-event-set-component.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.5.4/dist/aframe-extras.min.js"></script>
</head>

<body>

<script>

/* =========================
   POSICIONES
========================= */

const spawnPoints = {
  "#world_1": {x: 0, y: 0, z: 0, rotY: 0},
  "#world_2": {x: 0, y: 0, z: 0, rotY: 180}
};

/* =========================
   CAMBIO DE MUNDO
========================= */

function goWorld(id) {

  document.querySelectorAll('[data-world]')
    .forEach(w => w.setAttribute('visible', false));

  const target = document.querySelector(id);
  if (target) target.setAttribute('visible', true);

  const rig = document.querySelector('#playerRig');

  if (rig && spawnPoints[id]) {
    const p = spawnPoints[id];

    rig.object3D.position.set(p.x, p.y, p.z);
    rig.setAttribute('rotation', `0 ${p.rotY} 0`);
  }
}

/* =========================
   PORTAL AAA (VR FIXED)
========================= */

AFRAME.registerComponent('portal-aaa', {

  schema: {
    target: {type: 'string'},
    radius: {type: 'number', default: 2.2},
    cooldown: {type: 'number', default: 1500}
  },

  init: function () {
    this.player = document.querySelector('#playerRig');
    this.last = 0;
  },

  tick: function () {

    if (!this.player) return;

    const p = new THREE.Vector3();
    const m = new THREE.Vector3();

    this.player.object3D.getWorldPosition(p);
    this.el.object3D.getWorldPosition(m);

    const dist = p.distanceTo(m);

    if (dist < this.data.radius && Date.now() - this.last > this.data.cooldown) {
      this.last = Date.now();
      this.teleport();
    }
  },

  teleport: function () {

    let fade = document.querySelector('#fade');

    if (!fade) {
      fade = document.createElement('a-plane');
      fade.setAttribute('id', 'fade');
      fade.setAttribute('material', 'color:black; opacity:0');
      fade.setAttribute('width', '5');
      fade.setAttribute('height', '5');

      document.querySelector('a-scene').appendChild(fade);
    }

    fade.setAttribute('animation', 'property: material.opacity; to: 1; dur: 200');

    setTimeout(() => {
      goWorld(this.data.target);
      fade.setAttribute('animation', 'property: material.opacity; to: 0; dur: 400');
    }, 200);
  }
});

/* =========================
   PORTAL ENERGY
========================= */

AFRAME.registerComponent('portal-energy', {

  init: function () {
    this.base = this.el.getAttribute('rotation') || {x:0,y:0,z:0};
  },

  tick: function () {

    const t = Date.now() * 0.002;

    const pulse = 1 + Math.sin(t) * 0.08;
    const spin = Date.now() * 0.02;

    this.el.setAttribute('scale', `${pulse} ${pulse} ${pulse}`);
    this.el.setAttribute('rotation',
      `${this.base.x} ${this.base.y + spin} ${this.base.z}`
    );
  }
});

/* =========================
   VR AUDIO FIX
========================= */

function startAudio() {
  const music = document.querySelector('#music');
  if (music?.components?.sound) music.components.sound.playSound();
}

window.addEventListener('click', startAudio);
window.addEventListener('triggerdown', startAudio);
window.addEventListener('touchstart', startAudio);

/* =========================
   INIT
========================= */

window.addEventListener('load', () => goWorld('#world_1'));

</script>

<a-scene>

<!-- PLAYER VR CORRECTO -->
<a-entity id="playerRig"
          movement-controls="speed:0.3">

  <a-entity camera look-controls position="0 1.6 0"></a-entity>

  <!-- 🔥 IMPORTANTE: VR RAYCASTER REAL -->
  <a-entity id="rightHand"
            laser-controls="hand:right"
            raycaster="objects: .clickable"
            cursor="rayOrigin: entity; fuse:false"
            line="color:red">
  </a-entity>

  <a-entity id="leftHand"
            laser-controls="hand:left"
            raycaster="objects: .clickable"
            cursor="rayOrigin: entity; fuse:false"
            line="color:blue">
  </a-entity>

</a-entity>

<!-- ASSETS -->
<a-assets>
  <audio id="bgmusic" src="warm-nights.mp3" loop></audio>
  <audio id="Camion1" src="camion.mp3"></audio>
  <audio id="rotativo" src="rotativo.mp3"></audio>
</a-assets>

<!-- WORLD 1 -->
<a-entity id="world_1" data-world="true">

  <a-entity id="music"
            sound="src:#bgmusic; autoplay:false; loop:true; volume:10"></a-entity>

  <a-gltf-model src="backrooms_vr.glb"
                scale="1.25 1.25 1.25"></a-gltf-model>

  <a-sky color="#b28f50"></a-sky>

  <!-- PORTAL -->
  <a-entity class="clickable"
            geometry="primitive: torus; radius: 1"
            material="color:#7c3cff; emissive:#aa55ff"
            position="6 1.7 6"
            portal-aaa="target:#world_2"
            portal-energy>
  </a-entity>

</a-entity>

<!-- WORLD 2 -->
<a-entity id="world_2" visible="false" data-world="true">

  <!-- CAR + HITBOX (IMPORTANTE PARA VR) -->
  <a-entity class="clickable" position="-5 0 2">

    <a-gltf-model src="low_poly_mazda_mx-5_miata_na_update_opt.glb"></a-gltf-model>

    <a-box opacity="0"
           width="4" height="2" depth="2"
           sound="src:#rotativo; on:mouseenter">
    </a-box>

  </a-entity>

  <!-- TRUCK -->
  <a-entity class="clickable" position="-29 2 20">

    <a-gltf-model src="truck_opt.glb"></a-gltf-model>

    <a-box opacity="0"
           width="5" height="3" depth="6"
           sound="src:#Camion1; on:mouseenter">
    </a-box>

  </a-entity>

  <!-- RETURN PORTAL -->
  <a-entity class="clickable"
            geometry="primitive: torus; radius: 1"
            material="color:#00ffff; emissive:#00ffff"
            position="10 2 -4"
            portal-aaa="target:#world_1"
            portal-energy>
  </a-entity>

</a-entity>

</a-scene>

</body>
</html>
