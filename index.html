<!DOCTYPE html>

<head>

  <script src="https://unpkg.com/aframe-event-set-component@5.x.x/dist/aframe-event-set-component.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.5.4/dist/aframe-extras.min.js"></script> 
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.5.2/dist/aframe-extras.min.js"></script>
</head>

<body>

<script>

/* =========================
   🌌 POSICIONES DE APARICIÓN
========================= */

const spawnPoints = {
  "#world_1": { x: 0, y: 0, z: 0, rotY: 0 },
  "#world_2": { x: 0, y: 0, z: 0, rotY: 180 },
  "#world_3": { x: 0, y: 2, z: 5, rotY: 180 }
};

function stopAllWorldMusic() {
  ['music_world1', 'music_world2', 'music_world3'].forEach(id => {
    const soundEntity = document.querySelector('#' + id);
    if (soundEntity && soundEntity.components.sound) {
      soundEntity.components.sound.stopSound();
    }
  });
}

/* =========================
   🌌 CAMBIO DE MUNDO
========================= */
function goWorld(id) {
  stopAllWorldMusic();

  document.querySelectorAll('[data-world]').forEach(world => {
    world.setAttribute('visible', false);
  });

  const target = document.querySelector(id);
  if (target) {
    target.setAttribute('visible', true);
  }

  const rig = document.querySelector('#playerRig');
  if (rig && spawnPoints[id]) {
    const p = spawnPoints[id];
    rig.object3D.position.set(p.x, p.y, p.z);
    rig.setAttribute('rotation', `0 ${p.rotY} 0`);
  }

  let musicId = null;
  if (id === '#world_1') musicId = '#music_world1';
  if (id === '#world_2') musicId = '#music_world2';
  if (id === '#world_3') musicId = '#music_world3';

  const music = document.querySelector(musicId);
  if (music && music.components.sound) {
    music.components.sound.playSound();
  }
}

/* =========================
   🔊 RAYCASTER-SOUND
   Reproduce el sonido del modelo al hacer clic con el raycaster
========================= */
AFRAME.registerComponent('raycaster-sound', {
  init: function () {
    this.el.addEventListener('click', () => {
      const soundComp = this.el.components.sound;
      if (soundComp) {
        soundComp.stopSound();
        soundComp.playSound();
      }
    });
  }
});

/* =========================
   🔮 PORTAL AAA
========================= */
AFRAME.registerComponent('portal-aaa', {
  schema: {
    target: {type: 'string'},
    radius: {type: 'number', default: 2.2},
    cooldown: {type: 'number', default: 1500}
  },

  init: function () {
    this.player = document.querySelector('#playerRig');
    this.lastTeleport = 0;
  },

  tick: function () {
    if (!this.player) return;

    const playerPos = new THREE.Vector3();
    const portalPos = new THREE.Vector3();

    this.player.object3D.getWorldPosition(playerPos);
    this.el.object3D.getWorldPosition(portalPos);

    const distance = playerPos.distanceTo(portalPos);

    if (distance < this.data.radius && Date.now() - this.lastTeleport > this.data.cooldown) {
      this.lastTeleport = Date.now();
      this.teleport();
    }
  },

  teleport: function () {
    const target = this.data.target;

    let fade = document.querySelector('#fade');

    if (!fade) {
      fade = document.createElement('a-plane');
      fade.setAttribute('id', 'fade');
      fade.setAttribute('position', '0 0 -0.5');
      fade.setAttribute('width', '5');
      fade.setAttribute('height', '5');
      fade.setAttribute('material', 'color:black; opacity:0');

      const camera = document.querySelector('[camera]');
      if (camera) {
        camera.appendChild(fade);
      }
    }

    fade.setAttribute('animation__fadein', 'property: material.opacity; to:1; dur:250');

    setTimeout(() => {
      goWorld(target);
      fade.setAttribute('animation__fadeout', 'property: material.opacity; to:0; dur:500');
    }, 250);
  }
});

/* =========================
   🌀 PORTAL ENERGY
========================= */
AFRAME.registerComponent('portal-energy', {
  tick: function () {
    const time = Date.now() * 0.002;
    const scale = 1 + Math.sin(time) * 0.08;
    const rotation = Date.now() * 0.03;
    this.el.setAttribute('scale', `${scale} ${scale} ${scale}`);
    this.el.setAttribute('rotation', `0 ${rotation} 0`);
  }
});

/* =========================
   🚀 INICIO — pantalla de bienvenida para desbloquear audio
========================= */
document.addEventListener('DOMContentLoaded', () => {
  const scene = document.querySelector('a-scene');
  const overlay = document.getElementById('start-overlay');
  const btn = document.getElementById('start-btn');

  // Cargar mundo pero sin música todavía
  scene.addEventListener('loaded', () => {
    setTimeout(() => {
      // Mostrar mundos pero sin sonido aún
      document.querySelectorAll('[data-world]').forEach(w => w.setAttribute('visible', false));
      document.querySelector('#world_1').setAttribute('visible', true);
      const rig = document.querySelector('#playerRig');
      if (rig) rig.object3D.position.set(0, 0, 0);
    }, 300);
  });

  // Al pulsar el botón: ocultar overlay y arrancar música
  btn.addEventListener('click', () => {
    overlay.style.display = 'none';
    // Reanudar AudioContext si el navegador lo suspendió
    const ctx = THREE.AudioContext.getContext();
    if (ctx && ctx.state === 'suspended') {
      ctx.resume().then(() => playWorldMusic('#music_world1'));
    } else {
      playWorldMusic('#music_world1');
    }
  });
});

function playWorldMusic(id) {
  const music = document.querySelector(id);
  if (music && music.components.sound) {
    music.components.sound.playSound();
  }
}
