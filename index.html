<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  <script src="https://unpkg.com/aframe-event-set-component@5.x.x/dist/aframe-event-set-component.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.5.4/dist/aframe-extras.min.js"></script> 
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.5.2/dist/aframe-extras.min.js"></script>
</head>

<body>

<script>

	const spawnPoints = {

  "#world_1": {
    x: 0,
    y: 0,
    z: 0
  },

  "#world_2": {
    x: 15,
    y: 0,
    z: 15
  }

};


/* =========================
   🌌 MULTIVERSO CORE
========================= */

	function goWorld(id) {

  document.querySelectorAll('[data-world]').forEach(world => {
    world.setAttribute('visible', false);
  });

  const targetWorld = document.querySelector(id);

  if (targetWorld) {
    targetWorld.setAttribute('visible', true);
  }

  const rig = document.querySelector('#playerRig');

  if (rig && spawnPoints[id]) {

    const p = spawnPoints[id];

    rig.object3D.position.set(
      p.x,
      p.y,
      p.z
    );

  }

}


/* =========================
   🔮 PORTAL AAA (MARVEL STYLE)
========================= */

AFRAME.registerComponent('portal-aaa', {
  schema: {
    target: {type: 'string'},
    radius: {type: 'number', default: 2.2},
    cooldown: {type: 'number', default: 1500}
  },

  init: function () {
    this.player = document.querySelector('#playerRig');
    this.last = 0;
  },

  tick: function () {
    const p = new THREE.Vector3();
    const m = new THREE.Vector3();

    this.player.object3D.getWorldPosition(p);
    this.el.object3D.getWorldPosition(m);

    const dist = p.distanceTo(m);

    // 🌀 portal vivo
    const s = 1 + Math.sin(Date.now() * 0.004) * 0.06;
    this.el.setAttribute('scale', `${s} ${s} ${s}`);

    if (dist < this.data.radius && Date.now() - this.last > this.data.cooldown) {
      this.last = Date.now();
      this.absorb();
    }
  },

  absorb: function () {
    const target = this.data.target;

    let fade = document.querySelector('#fade');

    if (!fade) {
      fade = document.createElement('a-plane');
      fade.setAttribute('id', 'fade');
      fade.setAttribute('position', '0 0 -0.5');
      fade.setAttribute('width', '5');
      fade.setAttribute('height', '5');
      fade.setAttribute('material', 'color: black; opacity: 0');
      document.querySelector('a-scene').appendChild(fade);
    }

    fade.setAttribute('animation', {
      property: 'material.opacity',
      to: 1,
      dur: 250
    });

    setTimeout(() => {
      goWorld(target);

      fade.setAttribute('animation', {
        property: 'material.opacity',
        to: 0,
        dur: 500
      });
    }, 250);
  }
});

/* =========================
   🔥 ENERGY PORTAL
========================= */

AFRAME.registerComponent('portal-energy', {
  tick: function () {
    const t = Date.now() * 0.002;
    const s = 1 + Math.sin(t) * 0.08;
    const r = Date.now() * 0.03;

    this.el.setAttribute('scale', `${s} ${s} ${s}`);
    this.el.setAttribute('rotation', `0 ${r} 0`);
  }
});
/* =========================
   🔥 Sonido eventos
========================= */
AFRAME.registerComponent('raycaster-sound', {
  init: function () {
    var el = this.el;

    el.addEventListener('raycaster-intersected', function () {
      // Desbloquea AudioContext si está suspendido (Quest)
      var ctx = THREE.AudioContext.getContext();
      if (ctx && ctx.state === 'suspended') {
        ctx.resume().then(function () {
          el.components.sound.playSound();
        });
      } else {
        el.components.sound.playSound();
      }
    });

    el.addEventListener('raycaster-intersected-cleared', function () {
      el.components.sound.stopSound();
    });
  }
});
</script>

<a-scene>

  <!-- 🎮 PLAYER -->


<a-entity id="playerRig"
        position="0 0 0"
        movement-controls="speed: 0.3; fly: false;"
        universal-controls="movementEnabled: true;"
      >
         <!-- Controlador mano derecha -->
      <a-entity
        laser-controls="hand: right; model: true"
        raycaster="objects: .clickable"
        line="color: red; opacity: 0.8"
         id="rightHand" 
        oculus-touch-controls="hand: right; model: true"
	    cursor="rayOrigin: entity; fuse:false">
		</a-entity>

		   <a-entity
        laser-controls="hand: left; model: true"
        raycaster="objects: .clickable"
        line="color: blue; opacity: 0.8"
        id="leftHand" 
        oculus-touch-controls="hand: left; model: true"
		   cursor="rayOrigin: entity; fuse:false">
      </a-entity>
         
      <a-entity camera look-controls position="0 1.6 0"></a-entity>
         </a-entity>

		  
	
  <!-- 🌍 WORLD 1 (MAIN) -->
  <a-entity id="world_1" data-world="true">

    <a-sound src="warm-nights.mp3"
             autoplay="true"
             sound="loop: true; volume: 10"></a-sound>

    <a-gltf-model src="backrooms_vr.glb"
                  scale="1.25 1.25 1.25"></a-gltf-model>

    <a-plane rotation="-90 0 0"
             width="50" height="50"
             position="0 -4.344 0"
             material="color: #ba9652"></a-plane>

    <a-sky color="#b28f50"></a-sky>

    <!-- 🔮 PORTAL → WORLD 2 -->
    <a-entity id="portal_world2"
              class="clickable"
              geometry="primitive: torus; radius: 1"
              material="color: #7c3cff; emissive: #aa55ff; emissiveIntensity: 2"
              position="6.20096 1.76034 6.61931"
			  scale="0.75 0.75 0.75"
			  rotation="0 90 0"
              portal-aaa="target: #world_2; radius: 2.2"
              portal-energy>
    </a-entity>
	 
   
  
  </a-entity>

  <!-- 🌍 WORLD 2 -->
  <a-entity id="world_2" data-world="true" visible="false">
 
	<a-gltf-model src="low_poly_mazda_mx-5_miata_na_update_opt.glb"
    position="-5 0 2"
	 class="clickable"
    rotation="0 -90 0"
    id="rotativo"
    sound="src: rotativo.mp3; autoplay: false; loop: false"
    raycaster-sound>
	</a-gltf-model>

	
	  

    <a-gltf-model src="retro-futuristic_gas_station_opt.glb"></a-gltf-model>

    <a-gltf-model src="truck_opt.glb"
                  position="-29 2.3 20"
                  rotation="0 -20 0"></a-gltf-model>

    <a-gltf-model src="Sol_opt.glb"
                  position="-120 200 160"></a-gltf-model>

    <a-gltf-model src="cielo_opt.glb"
                  scale="300 300 300"></a-gltf-model>

    <a-cylinder color="red"
                position="0 1 4.34"
                scale="0.2 0.2 0.2"></a-cylinder>

    <!-- 🔮 PORTAL DE VUELTA -->
    <a-entity id="portal_back_to_main"
              class="clickable"
              geometry="primitive: torus; radius: 1"
              material="color: #00ffff; emissive: #00ffff; emissiveIntensity: 2"
              position="17.62962 1.96798 12.45876"
			  scale="0.75 0.75 0.75" 
			  rotation="0 90 0"
              portal-aaa="target: #world_1; radius: 2.2"
              portal-energy>
    </a-entity>

	  
	  
  </a-entity>

</a-scene>

</body>
</html>
